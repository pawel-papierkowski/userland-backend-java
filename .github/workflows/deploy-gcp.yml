# What we do?
# - Check out repo to GitHub Ubuntu server.
# - Set up Java 25 Temurin.
# - Compile docker image on GitHub.
# - Upload image as artifact to Google Cloud. It will be automatically run once deployed.
# In real project, we would have versions of this workflow for production, development, staging etc.
# They would be almost same, just with different variables and secrets.
# And, of course, SPRING_PROFILES_ACTIVE would be different.
name: Deploy Docker Image to Cloud

on:
  # This allows you to click a "Run workflow" button manually in GitHub
  # without needing to push new code every time you want to test it.
  workflow_dispatch:

env: # Environment variables.
  SERVICE_ACC: srv-userland # Name of service account for GCP project.
  GAR_LOCATION: europe-central2 # Data center region in Warsaw, Poland.
  REPOSITORY: userland-backend-java-repo # GCP Artifact Registry Repository.
  DASHBOARD_NAME: userland-backend-java # Name that backend will have in the Google Cloud Run dashboard.

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # This is required for requesting the OIDC JWT.
    steps:
      # Clone repo to temporary Ubuntu build server provided by GitHub.
      - name: Checkout Code
        uses: actions/checkout@v6

      # Install Java 25 JDK (Temurin distribution).
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven' # save downloaded dependencies for next time

      # Authenticate to Google Cloud using WIF. You can test it separately (test-gcp-auth.yml).
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ env.SERVICE_ACC }}@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      # Note: currently we should be logged into Google Cloud.
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Core of the pipeline!
      # Compiles the app directly into a Docker image and pushes it to Google Artifact Registry.
      # chmod +x mvnw grants execution permissions to the Maven wrapper.
      # The -D...publish=true flag tells Maven to immediately upload that finished Docker image
      # to your Google Artifact Registry using the unique commit hash (${{ github.sha }}) as the version tag.
      - name: Build and Push Docker Image
        run: |
          chmod +x mvnw
          
          IMAGE_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DASHBOARD_NAME }}:${{ github.sha }}"
          
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName=$IMAGE_URL \
            -Dspring-boot.build-image.publish=true

      # Launch a new container using the image that was just uploaded.
      # --allow-unauthenticated means the website is public and anyone on the internet can hit your API endpoints.
      # --memory=512Mi explicitly limits the container RAM.
      # env_vars:
      #   SPRING_DATASOURCE_*: This injects the Aiven DB credentials into the Cloud Run container.
      #     Local server will work as before.
      #   BPL_JVM_THREAD_COUNT: Paketo has 250 by default, cut it down.
      #   BPL_JVM_HEAD_ROOM: Tells Paketo how much % of container memory should be reserved for non-Java things like OS.
      #   BPL_JAVA_NMT_ENABLED: Disable Paketo's memory tracking. Mainly for clean logs.
      #   BPL_SPRING_CLOUD_BINDINGS_DISABLED: Disable Paketo's scanner for Kubernet stuff. Not needed, as we do not use Kubernet.
      #   JAVA_TOOL_OPTIONS: Use JVM arguments that will make JVM behave better in constrained environment.
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.DASHBOARD_NAME }}
          region: ${{ env.GAR_LOCATION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.DASHBOARD_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated --memory=512Mi'
          env_vars: |-
            SPRING_PROFILES_ACTIVE=gcp
            SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
            BPL_JVM_THREAD_COUNT=50
            BPL_JVM_HEAD_ROOM=25
            BPL_JAVA_NMT_ENABLED=false
            BPL_SPRING_CLOUD_BINDINGS_DISABLED=true
            JAVA_TOOL_OPTIONS=-XX:+UseSerialGC -Xss512k -XX:TieredStopAtLevel=1 -XX:ReservedCodeCacheSize=128M
