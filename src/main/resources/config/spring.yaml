# Configuration specific to Spring.

# Since it is portfolio project, it is fine to expose some Actuator endpoints.
management:
  endpoints:
    web:
      exposure: # ONLY expose these specific, safe endpoints
        include: "health,info,metrics,prometheus,mappings"
  info:
    env:
      enabled: true   # Allows the /actuator/info endpoint to show environment details

logging:
  structured:
    format:
      console: ecs # Output all console logs as JSON in the Elastic Common Schema format.