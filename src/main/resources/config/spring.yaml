# Configuration specific to Spring.

spring:
  main:
    banner-mode: off # will screw with gcp logging
  mvc:
    problemdetails:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate # never use 'update' or 'create'
    open-in-view: false # disable Open-In-View
  cloud:
    gcp: # disable gcp stuff locally, it will be enabled on gcp profile
      core:
        enabled: false
      logging:
        enabled: false

# Since it is portfolio project, it is fine to expose some Actuator endpoints.
management:
  endpoints:
    web:
      exposure: # ONLY expose these specific, safe endpoints
        include: "health,info,metrics,prometheus,mappings"
  info:
    env:
      enabled: true   # Allows the /actuator/info endpoint to show environment details


