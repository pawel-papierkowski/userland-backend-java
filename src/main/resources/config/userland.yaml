# Configuration specific to UserLand project: general config.

app:
  main:
    name: "UserLand"
    build: ${BUILD:DEV} # so system knows if it is running on production or in other environment
    version: "@project.version@" # use version from pom.xml file
    wwwDev: "http://localhost:5173/userland-frontend-" # you need to attach suffix like 'vue' yourself
    wwwProd: "https://pawelpapierkowski.net.pl/userland-frontend-" # you need to attach suffix like 'vue' yourself
  user:
    pending:
      removal-delay: 48 # when to remove pending users since creation, in hours
    token:
      length: 32
      activation: # user account activate
        expires: 24 # in hours
      email: # user email change
        expires: 30 # in minutes
      password: # user password reset
        expires: 30 # in minutes
      deletion: # user account deletion
        expires: 30 # in minutes