email:
  user:
    registration:
      subject: "UserLand: account registration"
      greeting: "Hello, <b>{0}</b>!"
      l1: "Thank you for interest in UserLand."
      l2: "Please activate your account here:"
      l3: "Link will be valid for {0} hours."
    activation:
      subject: "UserLand: welcome"
      greeting: "Hello, <b>{0}</b>!"
      l1: "Account was activated successfully. We are excited to have you on board."
      l2: "You can log in to UserLand here:"
    alreadyRegistered:
      subject: "UserLand: welcome"
      greeting: "Hello, <b>{0}</b>!"
      l1: "Someone recently tried to register an account with this email. You already have an account in UserLand."
      l2: "You can log in to UserLand here:"
    email:
      warning:
        subject: "UserLand: email change requested"
        greeting: "Hello, <b>{0}</b>!"
        l1: "A request was made to change the email associated with this account. If this was you, you can ignore this. If you did not request this, please contact support immediately."
      link:
        subject: "UserLand: email change requested"
        greeting: "Hello, <b>{0}</b>!"
        l1: "Please confirm change of email here:"
        l2: "Link will be valid for {0} minutes."
      confirm:
        subject: "UserLand: email changed"
        greeting: "Hello, <b>{0}</b>!"
        l1: "Email for your account was successfully changed."
    password:
      link:
        subject: "UserLand: password reset requested"
        greeting: "Hello, <b>{0}</b>!"
        l1: "Please reset your password here:"
        l2: "Link will be valid for {0} minutes."
      confirm:
        subject: "UserLand: password changed"
        greeting: "Hello, <b>{0}</b>!"
        l1: "Password for your account was successfully changed."
    delete:
      link:
        subject: "UserLand: account deletion requested"
        greeting: "Hello, <b>{0}</b>!"
        l1: "Please click this link to delete account:"
        l2: "Link will be valid for {0} minutes."
      confirm:
        subject: "UserLand: account deleted"
        greeting: "Hello, <b>{0}</b>!"
        l1: "Account was succesfully removed from UserLand system."